{% extends 'base/layout.html' %}
{% load static %}
{% block title %}{{ stream.title }}{% endblock %}

{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height: 100vh; padding-top: 0;">
    <div class="row justify-content-center w-100">
        <div class="col-md-8 col-12 text-center">
            <!-- Título y Descripción -->
            <h2 class="text-primary font-weight-bold mb-2" style="margin-top: 2px;">{{ stream.title }}</h2>
            <p class="text-muted mb-3">{{ stream.description }}</p>

            <!-- Sección de video -->
            <div class="video-container position-relative text-center mb-4" style="background: linear-gradient(135deg, #d4e0f5, #a2b4dc); border-radius: 15px; padding: 15px;">
                {% if user == stream.host %}
                    <video id="localVideo" autoplay muted class="video-player shadow-lg" style="width: 100%; max-width: 700px; border-radius: 10px;"></video>
                {% else %}
                    <video id="remoteVideo" autoplay class="video-player shadow-lg" style="width: 100%; max-width: 700px; border-radius: 10px;"></video>
                {% endif %}
            </div>

            <!-- Controles personalizados -->
            <div class="controls d-flex justify-content-center mt-3">
                {% if user == stream.host %}
                    <!-- Botón de Mute -->
                    <button id="muteButton" class="btn btn-outline-primary mx-2">
                        <i class="fas fa-volume-mute"></i>
                    </button>
                    <!-- Botón para finalizar el streaming -->
                    <form method="POST" action="{% url 'end_stream' stream.id %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger mx-2">
                            <i class="fas fa-stop-circle"></i> End Streaming
                        </button>
                    </form>
                {% endif %}
                <!-- Botón de Pantalla Completa -->
                <button id="fullscreenButton" class="btn btn-outline-secondary mx-2">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Incluye el archivo JS para WebRTC y los controles -->
<script defer src="{% static 'js/webrtc.js' %}"></script>
<script defer src="{% static 'js/video_controls.js' %}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log("Video page loaded, initializing WebRTC.");
        // Inicia el archivo webrtc.js solo después de cargar el DOM
    });
</script>
<body data-stream-id="{{ stream.id }}" 
    data-is-host="{% if user == stream.host %}true{% else %}false{% endif %}">
{% endblock %}
